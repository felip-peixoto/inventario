services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
    # Sem mapeamento de porta para o host: o backend acessa via rede interna (db:5432).
    # Para depurar do host, adicione:  ports: ["5433:5432"]

  backend:
    build: ./app/backend
    working_dir: /repo/app/backend
    volumes:
      - ./:/repo
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "inventario.main:app", "--host", "0.0.0.0", "--port", "8000", "--app-dir", "src", "--reload"]
    ports:
      - "8000:8000"

volumes:
  pgdata:
